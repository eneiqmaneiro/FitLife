<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css"> 
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
/>   
    <title>Fitlife | TMB</title>
</head>
<body>
   
     <nav>
 
        <a class="logo" href="../index.html">FitLife</a>
 
        <ul class="nav-links">
            <li><a class="nav-links" href="../index.html">HOME</a></li>
            <li><a class="nav-links" href="imc.html">IMC</a></li>
            <li><a class="nav-links" id="nav-active" href="tmb.html">TMB</a></li>
            <li><a class="nav-links" href="water.html">Água</a></li>
 
        </ul>
 
    </nav>
 
    <main>
        <section class="tool-container">

            <div class="tool-container-title">
                <h2><i class="fas fa-fire"></i>Taxa Metabólica Basal</h2>
            </div>
          
            <form>

                <div class="form-group">
                    <label for="gender">Gênero</label>
                    <select id="gender">
                    <option value="male">Masculino</option>
                    <option value="female">Feminino</option>

                </select>

                </div>

                <div class="form-group">
                    <label for="weight">Peso</label>
                <input type="number" id="weight" placeholder="Ex: 70">

                </div>

                <div class="form-group">
                    <label for="height">Altura (cm)</label>
                <input type="number" id="height" placeholder="Ex: 175">

                </div>

                <div class="form-group">
                    <label for="age">Idade (anos)</label>
                <input type="number" id="age" placeholder="Ex: 25">

                </div>

                

                <button class="action-btn" type="submit">Calcular calorias</button>

            </form>
 
            <a class="action-btn btn-back" href="../index.html">Voltar</a>

            <div class="result-box">

                <p>Gasto calórico basal:</p>
                <h2>00.00</h2>
                <p>Kcal/dias</p>
            </div>
        </section>
    </main>
 
</body>
</html>
